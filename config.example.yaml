# config.example.yaml — copy to config.yaml and fill in your values.
# Secrets (API keys) go in .env, not here.
# Run `python wony.py doctor` to validate your setup.

assistant:
  name: "Wony"
  owner_name: "User"
  # Free-form text injected into AI system prompts.
  personality: "Friendly and concise."
  # Language for AI responses and TTS. BCP-47 codes, e.g. "en", "pl".
  language: "en"

voice:
  # Run `python -c "from kokoro_onnx import Kokoro; k=Kokoro('models/kokoro-v1.0.onnx','models/voices-v1.0.bin'); print(k.get_voices())"` to list all voices.
  tts_voice: "af_heart"   # af_heart, af_sarah, am_michael, bf_emma, bm_george …
  speed: 1.0              # 0.5–2.0 speaking rate
  volume: 0.6             # 0.0–1.0 output gain
  model_path: "models/kokoro-v1.0.onnx"
  voices_path: "models/voices-v1.0.bin"

  stt:
    start_timeout: 4      # give up if no speech starts within this many seconds
    max_seconds: 12       # hard cap on total capture length
    silence_ms: 700       # trailing silence (ms) that ends the command
    vad_aggressiveness: 2 # webrtcvad 0–3 (higher = more aggressive filtering)

  # Continuous conversation: mic reopens after each response for chained commands.
  # Session ends on silence or a stop phrase ("stop", "thanks", "done", …).
  conversation:
    enabled: true
    follow_up_timeout: 4.0  # seconds of silence before closing the session

  # Note: streaming is always on now — the assistant starts speaking as soon as
  # the first sentence is ready (and the web/console UIs stream too). No toggle.

  # TTS inference device. 'auto' picks CUDA if onnxruntime-gpu detects a GPU,
  # falls back to CPU automatically on machines without CUDA. Force with 'cuda' or 'cpu'.
  tts_device: auto

  # Detect speech during playback and stop the assistant mid-sentence.
  barge_in:
    enabled: true
    sustain_frames: 15   # consecutive VAD frames (~30ms each) of speech required to trigger
                        # increase to reduce false triggers from speaker echo (e.g. 7–10)
    resume_phrases:
      - "continue"
      - "go on"
      - "keep going"
      - "go ahead"

  # Lower other apps' volume while Wony speaks or listens (Windows-only; no-ops elsewhere).
  ducking:
    enabled: true
    level: 0.15   # other apps drop to this fraction (15%) while Wony is active; restored after

  # Hands-free trigger. Requires: pip install -r requirements/wakeword.txt
  wake_word:
    enabled: false
    # Built-in phrase names: "hey jarvis", "alexa", "hey mycroft", "hey rhasspy"
    phrase: "hey jarvis"
    # Path to a custom .onnx model (overrides phrase).
    # Train with training/train_hey_wony.ipynb (Colab) or training/train_hey_wony.sh (WSL).
    model_path: null
    threshold: 0.5          # 0.0–1.0 detection score cutoff (lower = more sensitive)
    cooldown_seconds: 2.0   # minimum seconds between consecutive wake-word triggers
    vad_threshold: 0.5      # VAD confidence required before passing audio to wake word model
    noise_suppression: false

ai:
  # Options: anthropic | gemini | ollama | null (auto-detect from .env keys).
  provider: null
  anthropic_model: null   # null = latest
  gemini_model: null      # null = latest
  ollama_model: "llama3.1"  # required when provider is 'ollama'
  max_tokens: 8192
  # Reasoning policy (all providers):
  #   auto (default) — think only on direct knowledge questions; never on
  #                    tool-using steps, so voice replies stay fast.
  #   off            — never think anywhere (lowest latency).
  #   on             — same as auto (tool steps can't think safely).
  thinking: "auto"
  history:
    max_turns: 5          # past exchanges (user+assistant pairs) kept in context
  agent:
    max_steps: 5          # maximum tool-call iterations per request

# Only listed modules load. A module still won't run if credentials/deps are missing.
# Run "check setup" to see what each broken module needs.
enabled_modules:
  - ai             # always-on: conversation, history, AI provider routing
  - status         # always-on: module health and setup diagnostics
  - basics         # time, date, timers, shutdown, daily briefing
  - weather        # current weather and forecasts
  # - spotify        # playback control (play, pause, skip, search, volume)
  # - screen         # screenshot capture and OCR text extraction
  # - gmail          # read, search, and monitor Gmail (requires Google OAuth)
  # - calendar       # read Google Calendar events and check availability (requires Google OAuth)
  # - google_accounts  # manage multiple Google accounts
  # - league         # League of Legends player stats and match history
  # - shelly         # Shelly smart home device control (requires local device)
  # - scheduler      # Persistent reminders and recurring notifications (pip install -r requirements/scheduler.txt)
  # - web            # Web search and URL fetch (pip install -r requirements/web.txt)
  # - desktop        # Desktop control: open apps, windows, clipboard (pip install -r requirements/desktop.txt)
  # - mcp            # MCP client: connect external tool servers (pip install mcp)

# Per-module non-secret settings.
modules:
  shelly:
    base_url: "http://192.168.18.53"
  weather:
    default_units: "metric"   # metric | imperial
  gmail:
    poll_interval_minutes: 15
    max_results: 20
    max_body_chars: 1500
    # Safety gate — set to true to allow sending/replying to emails.
    allow_send: false
    # Set to true to have AI summarize email lists (sends content to your AI provider).
    use_ai: false
    ai_summary_max_emails: 30
  calendar:
    poll_interval_minutes: 15
    lookahead_hours: 24       # how far ahead to look for upcoming events
    max_results: 10
    search_days_back: 30
    search_days_ahead: 90
    work_start_hour: 9        # used by find_free_slots
    work_end_hour: 18
    # Safety gate — set to true to allow creating, editing, and deleting events.
    # Note: requires re-authentication after upgrading from the old readonly scope.
    allow_write: false
  web:
    max_content_chars: 3000   # max page content returned by fetch_url
    # Add TAVILY_API_KEY to .env for higher-quality search (free tier available).
    # Without it, DuckDuckGo is used automatically.
  desktop:
    # Safety gate — set to true to enable type/click/clipboard-write/file-open actions.
    allow_actions: false
    file_search_root: "~"     # root dir for find_file searches

tray:
  notify_on_ready: true
  open_browser_on_start: false

server:
  host: "127.0.0.1"
  port: 8000
